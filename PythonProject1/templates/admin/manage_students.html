<!DOCTYPE html>
<html>
<head>
<title>Manage Students</title>

<style>
body{
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
}

/* HEADER */
.header{
    background: linear-gradient(135deg, #0d6efd, #4f46e5);
    color: white;
    text-align: center;
    padding: 20px;
}

/* CONTAINER */
.container{
    width: 95%;
    margin: 25px auto;
}

/* CARD */
.card{
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    margin-bottom: 20px;
}

/* INPUTS */
input, select{
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
}

/* BUTTON */
button{
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.btn-primary{
    background: #4f46e5;
    color: white;
}

/* TABLE */
table{
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
    overflow: hidden;
}

th{
    background: #4f46e5;
    color: white;
    padding: 12px;
}

td{
    padding: 10px;
    border-bottom: 1px solid #eee;
    text-align: center;
}

/* DELETE BUTTON */
.delete{
    background: #ef4444;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    text-decoration: none;
}

/* BACK */
.back a{
    display: inline-block;
    margin-top: 15px;
    text-decoration: none;
    background: #111827;
    color: white;
    padding: 10px 15px;
    border-radius: 8px;
}
</style>

</head>

<body>

<div class="header">
    <h1>👨‍🎓 Manage Students</h1>
</div>

<div class="container">

    <!-- ADD STUDENT FORM -->
    <div class="card">
        <h2>➕ Add Student</h2>

        <form action="/add_student" method="POST">

            <input type="text" name="name" placeholder="Student Name" required>

            <input type="email" name="email" placeholder="Email" required>

            <input type="text" name="department" placeholder="Department" required>

            <input type="text" name="roll_no" placeholder="Roll Number" required>

            <input type="password" name="password" placeholder="Password" required>

            <button class="btn-primary" type="submit">
                Add Student
            </button>

        </form>
    </div>

    <!-- STUDENT TABLE -->
    <div class="card">
        <h2>📋 Student List</h2>

        <table>

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Roll No</th>
                <th>Action</th>
            </tr>

            {% for student in students %}

            <tr>
                <td>{{ student[0] }}</td>
                <td>{{ student[1] }}</td>
                <td>{{ student[2] }}</td>
                <td>{{ student[3] }}</td>
                <td>{{ student[4] }}</td>

                <td>
                    <a href="/delete_student/{{ student[0] }}" class="delete">
                        Delete
                    </a>
                </td>
            </tr>

            {% endfor %}

        </table>
    </div>

    <div class="back">
        <a href="/admin">⬅ Back to Dashboard</a>
    </div>

</div>

</body>
</html>

{% extends "index.html" %}
{% block title %}Apply Gate Pass{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-white">
                <h4 class="mb-0 py-2"><i class="bi bi-pencil-square me-2"></i>Apply for Gate Pass</h4>
            </div>
            <div class="card-body p-4">
                <form action="/apply" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Reason for Leaving</label>
                        <textarea name="reason" class="form-control" rows="3" placeholder="Explain the necessity..." required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Destination</label>
                        <input type="text" name="destination" class="form-control" placeholder="e.g. Home, Hospital, Market" required>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Exit Date</label>
                            <input type="date" name="out_date" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Exit Time</label>
                            <input type="time" name="out_time" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Expected Return</label>
                            <input type="time" name="return_time" class="form-control" required>
                        </div>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between align-items-center">
                        <a href="/student" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-success px-4">
                            Submit Application <i class="bi bi-send-fill ms-2"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
